name: Deploy Template

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment label"
        required: false
        default: "prod"
      region:
        description: "Cloud Run region"
        required: false
        default: "us-central1"
      service_name:
        description: "Cloud Run service name"
        required: false
        default: "debateguard"
      image_tag:
        description: "Container tag to deploy"
        required: false
        default: "manual"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deployment template note
        run: |
          echo "This workflow is an optional deployment template."
          echo "Wire OIDC auth + gcloud steps for your project before enabling automatic deploys."
          echo "Inputs: env=${{ github.event.inputs.environment }}, region=${{ github.event.inputs.region }}, service=${{ github.event.inputs.service_name }}, tag=${{ github.event.inputs.image_tag }}"

      # Suggested next steps for teams:
      # 1) google-github-actions/auth@v2 (OIDC to GCP)
      # 2) gcloud builds submit . --tag <artifact-registry-image>
      # 3) terraform apply OR bash scripts/deploy.sh
