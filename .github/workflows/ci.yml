name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Frontend tests
        run: npm test

  container-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-check
    steps:
      - uses: actions/checkout@v4
      - name: Build full app container image
        run: docker build -t debateguard-ci:latest .
